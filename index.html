<script>
(function () {
  'use strict';

  var ce = React.createElement;
  var useState = React.useState;
  var useEffect = React.useEffect;
  var Fragment = React.Fragment;

  var UI_BUILD = '2026-04-21-prod-safe';
  var HOST = window.location.hostname;

  // Detect static hosting — no backend available
  var IS_STATIC_HOST = (
    HOST.endsWith('github.io') ||
    HOST.endsWith('netlify.app') ||
    HOST.endsWith('vercel.app') ||
    HOST === ''
  );

  var IS_LOCALHOST = (HOST === 'localhost' || HOST === '127.0.0.1');
  var API_OVERRIDE = window.__API_ENDPOINT__ || null;

  // API is null on static hosts unless an explicit override is set
  var API = API_OVERRIDE || (IS_LOCALHOST ? 'http://localhost:8000/api' : null);

  function canUseApi() {
    if (!API) return false;
    if (IS_STATIC_HOST && !API_OVERRIDE) return false;
    return true;
  }

  // Safe fetch — always resolves, never throws, respects timeout
  function safeFetch(url, options, timeoutMs) {
    var ms = timeoutMs || 6000;
    return new Promise(function (resolve) {
      var controller = new AbortController();
      var timer = setTimeout(function () { controller.abort(); }, ms);
      var opts = Object.assign({}, options || {}, { signal: controller.signal });
      fetch(url, opts)
        .then(function (r) {
          clearTimeout(timer);
          resolve({ ok: r.ok, status: r.status, response: r });
        })
        .catch(function () {
          clearTimeout(timer);
          resolve({ ok: false, status: 0, response: null });
        });
    });
  }

  // ── Client-side fallback logic ─────────────────────────────────────────────

  function tokenizeClient(text) {
    var cleaned = String(text || '').toLowerCase().replace(/[^a-z0-9\s]/g, ' ').replace(/\s+/g, ' ').trim();
    return cleaned ? cleaned.split(' ') : [];
  }

  function hashTokenVec(token, dim) {
    dim = dim || 256;
    var vec = new Float32Array(dim);
    var h = 2166136261 >>> 0;
    for (var i = 0; i < token.length; i++) {
      h ^= token.charCodeAt(i);
      h = Math.imul(h, 16777619) >>> 0;
    }
    for (var j = 0; j < dim; j++) {
      h ^= h << 13; h ^= h >>> 17; h ^= h << 5;
      vec[j] = ((h >>> 0) % 2000) / 1000 - 1;
    }
    return vec;
  }

  function meanEmbed(tokens, dim) {
    dim = dim || 256;
    var out = new Float32Array(dim);
    if (!tokens.length) return out;
    for (var t = 0; t < tokens.length; t++) {
      var v = hashTokenVec(tokens[t], dim);
      for (var i = 0; i < dim; i++) out[i] += v[i];
    }
    for (var k = 0; k < dim; k++) out[k] /= tokens.length;
    var norm = 0;
    for (var n = 0; n < dim; n++) norm += out[n] * out[n];
    norm = Math.sqrt(norm) || 1;
    for (var m = 0; m < dim; m++) out[m] /= norm;
    return out;
  }

  function cosineVec(a, b) {
    var s = 0;
    for (var i = 0; i < a.length; i++) s += a[i] * b[i];
    return s;
  }

  function localAttribution(text, maxTokens) {
    maxTokens = maxTokens || 50;
    var tokens = tokenizeClient(text);
    if (!tokens.length) return [];
    tokens = tokens.slice(0, maxTokens);
    var eOrig = meanEmbed(tokens);
    var rows = [];
    for (var i = 0; i < tokens.length; i++) {
      var masked = tokens.slice(0, i).concat(tokens.slice(i + 1));
      var score;
      if (!masked.length) {
        score = 1.0;
      } else {
        var eMask = meanEmbed(masked);
        score = 1 - cosineVec(eOrig, eMask);
      }
      rows.push({ position: i, token: tokens[i], attribution_score: Number(score.toFixed(6)) });
    }
    rows.sort(function (x, y) { return y.attribution_score - x.attribution_score; });
    rows.forEach(function (r, idx) { r.rank = idx + 1; });
    rows.sort(function (x, y) { return x.position - y.position; });
    return rows;
  }

  // ── API status hook — safe polling, gives up after MAX_RETRIES ────────────

  function useApiStatus(apiEnabled) {
    var s = useState(apiEnabled ? 'checking' : 'disabled');
    var status = s[0]; var setStatus = s[1];

    useEffect(function () {
      if (!apiEnabled) { setStatus('disabled'); return; }

      var active = true;
      var retryTimer = null;
      var retries = 0;
      var MAX_RETRIES = 3;
      var POLL_MS = 120000; // 2 min between success polls

      function probe() {
        if (!active) return;
        safeFetch(API + '/summary', {}, 4000).then(function (res) {
          if (!active) return;
          if (res.ok) {
            setStatus('online');
            retries = 0;
            retryTimer = setTimeout(probe, POLL_MS);
          } else {
            retries += 1;
            if (retries < MAX_RETRIES) {
              setStatus('checking');
              retryTimer = setTimeout(probe, 8000);
            } else {
              setStatus('offline'); // give up — no more polling
            }
          }
        });
      }

      probe();
      return function () { active = false; if (retryTimer) clearTimeout(retryTimer); };
    }, [apiEnabled]);

    return status;
  }

  // ── Shorthand helpers ──────────────────────────────────────────────────────

  function h(tag, props) {
    var args = [tag, props || {}];
    for (var i = 2; i < arguments.length; i++) args.push(arguments[i]);
    return ce.apply(null, args);
  }

  // ── Reusable components ───────────────────────────────────────────────────

  function StatCard(props) {

  }

  // ── Nav ───────────────────────────────────────────────────────────────────

  function Nav(props) {

        }),
        h('div', { style: { marginLeft:'auto', display:'flex', alignItems:'center', gap:6 } },
          h('span', { style: { display:'inline-block', width:8, height:8, borderRadius:'50%', background:statusColor, boxShadow:'0 0 6px '+statusColor } }),
          h('span', { style: { fontSize:11, color:statusColor, fontWeight:500 } }, statusLabel)
        )

      status === 'offline' && canUseApi() ? h('div', { style: { background:'rgba(239,68,68,0.12)', borderTop:'1px solid rgba(239,68,68,0.25)', padding:'8px 32px', fontSize:12, color:'#fca5a5', textAlign:'center' } },
        '\u26a0 Backend not reachable at ', h('code', { style: { color:'#fcd34d' } }, API),
        '. Start the server: ', h('code', { style: { color:'#fcd34d' } }, 'python api_server.py'),
        ' \u2014 or set ', h('code', { style: { color:'#fcd34d' } }, 'window.__API_ENDPOINT__'), ' for remote deployment.'
      ) : null,
      IS_STATIC_HOST ? h('div', { style: { background:'rgba(245,158,11,0.12)', borderTop:'1px solid rgba(245,158,11,0.25)', padding:'8px 32px', fontSize:12, color:'#fde68a', textAlign:'center' } },
        'Running in demo mode on static hosting. Backend features use graceful local fallbacks.'
      ) : null
    );
  }

  // ── Overview Page ─────────────────────────────────────────────────────────

  function OverviewPage() {
    return h('div', { className:'fade-up' },
      h('div', { style: { textAlign:'center', padding:'60px 0 32px' } },
        h('h1', { style: { fontSize:44, fontWeight:800, letterSpacing:'-0.03em', lineHeight:1.2, background:'linear-gradient(135deg,#f1f5f9,#94a3b8)', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent' } }, 'Dynamic Trend & Event Detector'),
        h('p', { style: { fontSize:18, color:'var(--text-muted)', marginTop:12 } }, 'Emerging Topic Detection & News Correlation using Neural Topic Modeling'),
        h('p', { style: { fontSize:13, color:'var(--text-dim)', marginTop:6 } }, 'Mehak Jain (230079) \u00b7 Anuj Kumar Singh (230073)')
      ),

      h('div', { style: { display:'flex', gap:14, flexWrap:'wrap', marginBottom:32 } },
        h(StatCard, { value:'11K', label:'Articles', color:'var(--blue)' }),
        h(StatCard, { value:'14', label:'Topics (BERT)', color:'var(--cyan)' }),
        h(StatCard, { value:'1036%', label:'COVID Velocity', color:'var(--red)' }),
        h(StatCard, { value:'\u2705', label:'Context Separated', color:'var(--green)' })
      ),

      h(Section, { badge:'THE PROBLEM', title:'Real Events vs Internet Noise' },
        h('div', { style: { display:'grid', gridTemplateColumns:'1fr 1fr', gap:20 } },
          h('div', { style: { padding:20, borderRadius:'var(--radius-sm)', background:'rgba(16,185,129,0.06)', border:'1px solid rgba(16,185,129,0.12)' } },
            h('div', { style: { fontWeight:700, color:'var(--green)', marginBottom:10, fontSize:13 } }, '\u2713 REAL EVENT'),
            h('ul', { style: { color:'var(--text-muted)', fontSize:13, lineHeight:2, paddingLeft:18 } },
              h('li', null, 'Sustained multi-day media coverage'),
              h('li', null, 'Accelerating article velocity'),
              h('li', null, 'Multiple independent sources'),
              h('li', null, 'Verifiable in GDELT database')
            )
          ),
          h('div', { style: { padding:20, borderRadius:'var(--radius-sm)', background:'rgba(239,68,68,0.06)', border:'1px solid rgba(239,68,68,0.12)' } },
            h('div', { style: { fontWeight:700, color:'var(--red)', marginBottom:10, fontSize:13 } }, '\u2717 INTERNET NOISE'),
            h('ul', { style: { color:'var(--text-muted)', fontSize:13, lineHeight:2, paddingLeft:18 } },

              h('li', null, 'Confined to single platform'),
              h('li', null, 'No mainstream coverage'),
              h('li', null, 'Absent from GDELT')
            )
          )
        )
      ),

      h(Section, { badge:'PIPELINE', title:'Two-Phase Architecture' },
        h('div', { style: { display:'grid', gridTemplateColumns:'1fr 40px 1fr', alignItems:'center', gap:16 } },
          h('div', { style: { padding:20, borderRadius:'var(--radius-sm)', background:'rgba(245,158,11,0.06)', border:'1px solid rgba(245,158,11,0.12)' } },
            h('div', { style: { fontWeight:700, color:'var(--orange)', fontSize:13, marginBottom:8 } }, 'PHASE 1 \u2014 LDA (Advanced ML)'),
            h('div', { style: { fontSize:12, color:'var(--text-muted)', lineHeight:1.8 } },
              'TF-IDF \u2192 CountVectorizer \u2192 LDA (10 topics)', h('br', null),
              '+ Temporal Weight \u00b7 Category Velocity \u00b7 Text Richness', h('br', null),
              h('span', { style: { color:'var(--red)' } }, '\u26a0 Bag-of-words conflation')
            )
          ),
          h('div', { style: { textAlign:'center', fontSize:24, color:'var(--text-dim)' } }, '\u2192'),
          h('div', { style: { padding:20, borderRadius:'var(--radius-sm)', background:'rgba(59,130,246,0.06)', border:'1px solid rgba(59,130,246,0.12)' } },
            h('div', { style: { fontWeight:700, color:'var(--blue)', fontSize:13, marginBottom:8 } }, 'PHASE 2 \u2014 BERTopic (Deep Learning)'),
            h('div', { style: { fontSize:12, color:'var(--text-muted)', lineHeight:1.8 } },
              'SBERT (384-dim) \u2192 TPI (+32) \u2192 SVD (50) \u2192 UMAP (5-dim) \u2192 HDBSCAN', h('br', null),
              '\u2192 c-TF-IDF topic representation', h('br', null),
              h('span', { style: { color:'var(--green)' } }, '\u2705 Context-aware separation')
            )
          )
        )

      h(Section, { badge:'ARCHITECTURE', title:'Full Pipeline Architecture' },

          'End-to-end flow from raw HuffPost articles through EDA, LDA baseline, BERTopic neural pipeline, Phase 3 event detection, and the live Flask API + React UI. The red node marks LDA\'s failure (COVID peak 2014); the green node marks BERTopic\'s correction (COVID peak 2020).'
        ),

            'Dataset \u2192 EDA \u2192 LDA (Phase 1) \u2192 BERTopic (Phase 2) \u2192 Event Detection (Phase 3) \u2192 Flask API :8000 \u2192 React UI'
          )
        )

      h(Section, { badge:'KEY FINDING', title:'The COVID Conflation Problem \u2014 Solved' },
        h('div', { style: { display:'grid', gridTemplateColumns:'1fr 1fr', gap:20 } },

          ),
          h('div', { style: { padding:20, borderRadius:'var(--radius-sm)', background:'rgba(16,185,129,0.06)', border:'1px solid rgba(16,185,129,0.2)', textAlign:'center' } },
            h('div', { style: { fontSize:11, color:'var(--green)', fontWeight:700, textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:8 } }, 'Phase 2 \u2014 BERTopic'),

      ),

          h('p', null, 'Every day, thousands of topics trend across the internet. Most are noise \u2014 viral memes, celebrity gossip, outrage cycles that die within hours. The core challenge is: ', h('strong', { style:{ color:'var(--text)' } }, 'how do you algorithmically distinguish a genuine emerging news event from internet noise?'))

              return h('div', { key:row.token+'-'+idx, title:row.token+': '+score.toFixed(4),
                style: { height:76, borderRadius:6, background:'rgba(16,185,129,'+alpha+')', border:'1px solid rgba(16,185,129,0.2)', display:'flex', alignItems:'center', justifyContent:'center', padding:'4px 2px' }
              }, h('span', { style: { fontSize:10, color:'#d1fae5', textAlign:'center', lineHeight:1.2 } }, row.token));
            })
          ),
          h('div', { style: { marginTop:12 } },
            h('div', { style: { fontSize:12, color:'var(--text-dim)', marginBottom:6 } }, 'Top token contribution bars'),
            sortedLive.slice(0, 10).map(function (row, i) {
              var score = Number(row.attribution_score) || 0;
              var widthPct = Math.max(4, (score/(maxScore||1))*100);
              return h('div', { key:row.token+'-bar-'+i, style: { display:'grid', gridTemplateColumns:'140px 1fr 80px', gap:8, alignItems:'center', marginBottom:6 } },
                h('div', { style: { fontSize:12, color:'var(--text)' } }, row.token),
                h('div', { style: { height:10, borderRadius:999, background:'rgba(255,255,255,0.08)', overflow:'hidden' } },
                  h('div', { style: { width:widthPct+'%', height:'100%', background:'linear-gradient(90deg,#06b6d4,#10b981)' } })
                ),
                h('div', { style: { fontSize:12, color:'var(--cyan)', textAlign:'right', fontWeight:600 } }, score.toFixed(4))
              );
            })
          ),
          liveTop.length ? h('div', { style: { marginTop:14, display:'flex', gap:8, flexWrap:'wrap' } },
            liveTop.map(function (tk, i) {
              return h('span', { key:tk.token+'-'+i, style: { padding:'5px 10px', borderRadius:999, background:'rgba(6,182,212,0.15)', color:'var(--cyan)', fontSize:12 } },
                tk.token + ' (' + Number(tk.attribution_score||tk.mean_attribution||0).toFixed(4) + ')');
            })
          ) : null
        ) : null
      ),
      h(Section, { badge:'STEP 13 (STATIC)', title:'Embedding Interpretability \u2014 Token Attribution (Corpus Baseline)',
        subtitle:'Precomputed corpus-level artifact from bert_model.py. Use the Dynamic section above for input-specific attribution.' },
        h('div', { style: { padding:14, borderRadius:'var(--radius-sm)', background:'var(--bg)', marginBottom:18, fontSize:13, color:'var(--text-muted)', lineHeight:1.8 } },
          'Token attribution measures how much removing each word changes the SBERT embedding. High scores confirm the model attends to topically relevant terms.'
        ),
        staticLoading ? h('p', { style: { fontSize:13, color:'var(--text-dim)' } }, 'Loading interpretability outputs...') : null,
        staticError ? h('p', { style: { fontSize:13, color:'var(--red)' } }, staticError) : null,
        !staticLoading && !staticError && heatmap ? h('div', { style: { marginBottom:20 } },
          h('img', { src:heatmap, alt:'Token attribution heatmap', style: { width:'100%', borderRadius:'var(--radius)', border:'1px solid var(--border)', boxShadow:'var(--shadow)' } }),
          h('p', { style: { fontSize:12, color:'var(--text-dim)', marginTop:8 } }, 'Token attribution heatmap (3 topics \u00d7 5 representative documents).')
        ) : null,
        !staticLoading && !staticError && !heatmap ? h(Plot, { src:'bert_plots/token_attribution.png', alt:'Token attribution heatmap', caption:'Static corpus heatmap (precomputed)' }) : null
      ),
      h(Section, { badge:'TOP TOKENS', title:'Top-5 Attributed Tokens Per Topic' },
        h('div', { style: { overflowX:'auto' } },
          h('table', { style: { width:'100%', borderCollapse:'collapse', fontSize:12 } },
            h('thead', null, h('tr', null,
              ['Topic ID','Token','Mean Attribution Score'].map(function (col) {
                return h('th', { key:col, style: { textAlign:'left', padding:'8px 10px', borderBottom:'1px solid var(--border)', color:'var(--text-dim)', fontWeight:600 } }, col);
              })
            )),
            h('tbody', null,
              rowsByTopic.length === 0 ? h('tr', null, h('td', { colSpan:3, style: { padding:'10px', color:'var(--text-dim)' } }, canUseApi() ? 'No attribution rows found.' : 'Backend required for topic attribution table.')) : null,
              rowsByTopic.map(function (topicObj, idx) {
                return (topicObj.top_tokens || []).map(function (tk, jdx) {
                  return h('tr', { key:idx+'-'+jdx, style: { background:jdx%2===0?'rgba(255,255,255,0.02)':'transparent' } },
                    h('td', { style: { padding:'8px 10px', color:'var(--text-muted)' } }, topicObj.topic_id),
                    h('td', { style: { padding:'8px 10px', color:'var(--text)' } }, tk.token),
                    h('td', { style: { padding:'8px 10px', color:'var(--cyan)', fontWeight:600 } }, Number(tk.mean_attribution).toFixed(4))
                  );
                });
              })
            )
          )
        )
      )
    );
  }

  // ── Phase 3 Page ─────────────────────────────────────────────────────────

  function Phase3Page() {
    var s1 = useState(''); var detectText = s1[0]; var setDetectText = s1[1];
    var s2 = useState(null); var detectResult = s2[0]; var setDetectResult = s2[1];
    var s3 = useState(false); var detectLoading = s3[0]; var setDetectLoading = s3[1];
    var s4 = useState(null); var detectError = s4[0]; var setDetectError = s4[1];
    var s5 = useState([]); var events = s5[0]; var setEvents = s5[1];
    var s6 = useState(false); var eventsLoading = s6[0]; var setEventsLoading = s6[1];

    // Load events on mount
    useEffect(function () {
      if (!canUseApi()) return;
      setEventsLoading(true);
      safeFetch(API + '/events', {}, 6000).then(function (res) {
        if (res.ok && res.response) {
          res.response.json().then(function (data) {
            setEvents(Array.isArray(data) ? data : []);
            setEventsLoading(false);
          }).catch(function () { setEventsLoading(false); });
        } else { setEventsLoading(false); }
      });
    }, []);

    function detectTopic(inputText) {
      var t = (inputText || detectText || '').trim();
      if (!t) return;
      setDetectLoading(true); setDetectError(null); setDetectResult(null);
      if (!canUseApi()) {
        setTimeout(function () {
          setDetectResult({ topic_id: -1, label: 'Demo Mode', confidence: 0 });
          setDetectError('Backend required for real predictions.');
          setDetectLoading(false);
        }, 300);
        return;
      }
      safeFetch(API + '/predict', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ text: t }) }, 8000)
        .then(function (res) {
          if (!res.ok || !res.response) {
            setDetectError('Could not connect to API.');
            setDetectLoading(false);
            return;
          }
          res.response.json().then(function (payload) {
            setDetectResult(payload);
            setDetectLoading(false);
          }).catch(function () { setDetectError('Invalid response.'); setDetectLoading(false); });
        });
    }

    function signalBadge(cls) {
      var colors = { EMERGING:'#f44336', STRONG_SIGNAL:'#ff9800', WEAK_SIGNAL:'#fdd835', NOISE:'#9e9e9e' };
      var textColors = { EMERGING:'#fff', STRONG_SIGNAL:'#fff', WEAK_SIGNAL:'#000', NOISE:'#fff' };
      return h('span', { style: { display:'inline-block', padding:'3px 10px', borderRadius:12, fontSize:11, fontWeight:700, background:colors[cls]||'#9e9e9e', color:textColors[cls]||'#fff' } }, cls || 'UNKNOWN');
    }

    return h('div', { className:'fade-up' },
      h('div', { style: { display:'flex', gap:14, flexWrap:'wrap', marginBottom:24 } },
        h(StatCard, { value: events.filter(function(e){return e.is_real_event;}).length.toString(), label:'Real Events', color:'var(--green)' }),
        h(StatCard, { value: events.filter(function(e){return e.signal_class==='EMERGING';}).length.toString(), label:'Emerging', color:'var(--red)' }),
        h(StatCard, { value: events.filter(function(e){return e.gdelt_verified;}).length.toString(), label:'GDELT Verified', color:'var(--cyan)' }),
        h(StatCard, { value: events.length.toString(), label:'Topics Analyzed', color:'var(--blue)' })
      ),

      h(Section, { badge:'LIVE DETECTOR', title:'Phase 3: Dynamic Event Detector', subtitle:'Enter a news headline to classify its topic using centroid cosine similarity in SBERT embedding space' },
        h('div', { style: { display:'flex', gap:12, marginBottom:14 } },
          h('input', { type:'text', value:detectText, onChange:function(e){setDetectText(e.target.value);},
            onKeyDown:function(e){ if(e.key==='Enter') detectTopic(); },
            placeholder:'Enter a news headline or article text...',
            style: { flex:1, padding:'12px 16px', borderRadius:'var(--radius-sm)', background:'var(--bg-input)', border:'1px solid var(--border)', color:'var(--text)', fontFamily:'Inter', fontSize:14, outline:'none' }
          }),
          h('button', { onClick:function(){detectTopic();}, disabled:detectLoading||!detectText.trim(),
            style: { padding:'12px 24px', borderRadius:'var(--radius-sm)', border:'none', background:detectLoading?'var(--text-dim)':'var(--blue)', color:'#fff', fontFamily:'Inter', fontSize:13, fontWeight:600, cursor:detectLoading?'wait':'pointer', whiteSpace:'nowrap' }
          }, detectLoading ? '\u23f3 Detecting...' : '\ud83d\udd0d Detect Topic')
        ),
        detectError ? h('p', { style: { color:'var(--red)', fontSize:13, marginBottom:10 } }, '\u26a0 ' + detectError) : null,
        detectResult ? h('div', { className:'fade-up', style: { padding:20, borderRadius:'var(--radius-sm)', background:'var(--bg)', border:'1px solid var(--border)' } },
          h('div', { style: { display:'flex', alignItems:'center', gap:16, marginBottom:12 } },
            h('div', { style: { fontSize:11, color:'var(--blue)', fontWeight:600, textTransform:'uppercase' } }, 'Predicted Topic'),
            h('div', { style: { fontSize:20, fontWeight:800 } }, detectResult.label || 'Unknown')
          ),
          h('div', { style: { display:'flex', alignItems:'center', gap:12 } },
            h('span', { style: { fontSize:12, color:'var(--text-dim)' } }, 'Confidence:'),
            h('div', { style: { flex:1, height:10, borderRadius:999, background:'rgba(255,255,255,0.08)', overflow:'hidden', maxWidth:300 } },
              h('div', { style: { width:Math.round((detectResult.confidence||0)*100)+'%', height:'100%', background:'linear-gradient(90deg,#3b82f6,#06b6d4)', transition:'width 0.5s' } })
            ),
            h('span', { style: { fontSize:13, fontWeight:700, color:'var(--cyan)' } }, ((detectResult.confidence||0)*100).toFixed(1)+'%')
          )
        ) : null
      ),

      h(Section, { badge:'DETECTED EVENTS', title:'Phase 3 Event Classification Results',
        subtitle:'BERTrend signal classification + GDELT DOC 2.0 external verification (Boutaleb et al., 2024)' },
        eventsLoading ? h('p', { style: { color:'var(--text-dim)', fontSize:13 } }, 'Loading events...') : null,
        !eventsLoading && events.length === 0 && canUseApi() ? h('p', { style: { color:'var(--text-dim)', fontSize:13 } }, 'No events found. Run phase3_detector.py first.') : null,
        !eventsLoading && !canUseApi() ? h('p', { style: { color:'var(--orange)', fontSize:13 } }, 'Backend required for event data. Start api_server.py on port 8000.') : null,
        events.length > 0 ? h('div', { style: { overflowX:'auto' } },
          h('table', { style: { width:'100%', borderCollapse:'collapse', fontSize:13 } },
            h('thead', null, h('tr', null,
              ['Topic','Signal Class','Peak Year','Velocity','GDELT Verified','Real Event'].map(function(col) {
                return h('th', { key:col, style: { textAlign:'left', padding:'10px 12px', borderBottom:'2px solid var(--border)', color:'var(--text-dim)', fontWeight:700, fontSize:11, textTransform:'uppercase', letterSpacing:'0.04em' } }, col);
              })
            )),
            h('tbody', null, events
          .filter(function(e){ return e.signal_class !== 'NOISE'; })
          .sort(function(a, b){
            return (b.peak_velocity != null ? b.peak_velocity : 0) -
                   (a.peak_velocity != null ? a.peak_velocity : 0);
          })
          .map(function(evt, i) {
              return h('tr', { key:evt.topic_id, style: { background: i%2===0 ? 'transparent' : 'rgba(255,255,255,0.02)', transition:'background 0.2s' } },
                h('td', { style: { padding:'10px 12px', fontWeight:600, color:'var(--text)' } }, evt.topic_label),
                h('td', { style: { padding:'10px 12px' } }, signalBadge(evt.signal_class)),
                h('td', { style: { padding:'10px 12px', color:'var(--text-muted)' } }, evt.peak_year || '\u2014'),
                h('td', { style: { padding:'10px 12px', color: (evt.peak_velocity||0) > 1 ? 'var(--green)' : 'var(--text-muted)', fontWeight:600 } },
                  evt.peak_velocity != null ? (evt.peak_velocity > 0 ? '+' : '') + (evt.peak_velocity * 100).toFixed(0) + '%' : '\u2014'
                ),
                h('td', { style: { padding:'10px 12px', fontSize:16 } }, evt.gdelt_verified ? '\u2705' : '\u274c'),
                h('td', { style: { padding:'10px 12px', fontSize:16 } }, evt.is_real_event ? '\u2705' : '\u274c')
              );
            }))
          )
        ) : null
      ),

      h(Section, { badge:'SIGNAL EVOLUTION', title:'BERTrend Signal Heatmap', subtitle:'Topic \u00d7 Year signal classification (Boutaleb et al., 2024 \u2014 arXiv:2411.05930)' },
        h(Plot, { src:'bert_plots/signal_evolution.png', alt:'Signal Evolution Heatmap', caption:'Gray=NOISE, Yellow=WEAK, Orange=STRONG, Red=EMERGING. Cell values show document count N(k,t).' }),
        h('div', { style: { marginTop:16, display:'grid', gridTemplateColumns:'1fr 1fr', gap:16 } },
          h(Plot, { src:'bert_plots/gdelt_verification.png', alt:'GDELT Verification', caption:'GDELT DOC 2.0 external verification of detected event spikes' }),
          h(Plot, { src:'bert_plots/phase3_pipeline_comparison.png', alt:'Pipeline Comparison', caption:'3-panel pipeline summary: velocity, signals, and GDELT verification' })
        )
      ),

      h(Section, { badge:'METHODOLOGY', title:'How Phase 3 Works' },
        h(Narrative, { icon:'\ud83d\udcca', title:'BERTrend Popularity Metric' },
          h('p', null, 'P(k,t) = N(k,t) \u00d7 freq_updates(k,t) \u00d7 decay(k,t)'),
          h('p', { style: { marginTop:6 } }, 'Where decay = exp(-\u03bb \u00d7 gaps) penalizes topics with coverage gaps. Topics are classified as NOISE (bottom 25%), WEAK_SIGNAL (25-75%), STRONG_SIGNAL (top 25%), or EMERGING (STRONG + >50% velocity growth).')
        ),
        h(Narrative, { icon:'\ud83c\udf10', title:'GDELT Cross-Verification' },
          h('p', null, 'Each EMERGING topic is verified against the GDELT DOC 2.0 API (free, no key). If GDELT\'s peak media volume falls within \u00b16 months of our detected spike, the event is marked VERIFIED.')
        ),
        h(Narrative, { icon:'\ud83d\udd0d', title:'Centroid Prediction' },
          h('p', null, 'New articles are classified by computing cosine similarity of their SBERT embedding against each topic\'s centroid in 384-dim space. This bypasses unreliable UMAP.transform() for single documents.')
        )
      )
    );
  }

  // ── App root ──────────────────────────────────────────────────────────────

  function App() {
    var s1 = useState('overview'); var page = s1[0]; var setPage = s1[1];
    var s2 = useState(null); var latestPrediction = s2[0]; var setLatestPrediction = s2[1];
    var apiEnabled = canUseApi();
    var apiStatus = useApiStatus(apiEnabled);

    return h('div', null,
      h(Nav, { active:page, onNav:setPage, apiStatus:apiStatus }),
      h('main', { style: { maxWidth:1280, margin:'0 auto', padding:'28px 28px 60px' } },
        page==='overview' ? h(OverviewPage) : null,
        page==='phase1' ? h(Phase1Page) : null,
        page==='phase2' ? h(Phase2Page) : null,
        page==='phase3' ? h(Phase3Page) : null,
        page==='predict' ? h(PredictPage, { onPredicted:setLatestPrediction }) : null,
        page==='compare' ? h(ComparePage) : null,
        page==='interpretability' ? h(InterpretabilityPage, { latestPrediction:latestPrediction }) : null
      ),
      h('footer', { style: { borderTop:'1px solid var(--border)', padding:'20px 28px', textAlign:'center' } },
        h('p', { style: { fontSize:12, color:'var(--text-dim)' } }, 'Dynamic Trend & Event Detector \u00b7 Mehak Jain & Anuj Kumar Singh \u00b7 AML & DL 2025'),
        h('p', { style: { fontSize:10, color:'var(--text-dim)', marginTop:4 } }, 'Grootendorst (2022) arXiv:2203.05794 \u00b7 Reimers & Gurevych (2019) arXiv:1908.10084 \u00b7 Blei et al. (2003) JMLR')
      )
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(ce(App));
})();
</script>
</body>
</html>
