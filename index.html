<script type="text/babel">
const { useState, useEffect } = React;
// Environment-aware API endpoint: auto-detect local dev vs deployed
const API = window.__API_ENDPOINT__
  || ((window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
      ? 'http://localhost:5001/api'
      : `${window.location.protocol}//${window.location.hostname}:5001/api`);
const UI_BUILD = '2026-04-20-b4';

// --- API Status Hook ---
function useApiStatus() {
  const [status, setStatus] = useState('checking');
  useEffect(() => {
    let mounted = true;
    const check = () => {
      fetch(`${API}/summary`, { signal: AbortSignal.timeout(3000) })
        .then(r => { if (mounted) setStatus(r.ok ? 'online' : 'error'); })
        .catch(() => { if (mounted) setStatus('offline'); });
    };
    check();
    const id = setInterval(check, 15000);
    return () => { mounted = false; clearInterval(id); };
  }, []);
  return status;
}

function tokenizeClient(text) {
  const cleaned = String(text || '')
    .toLowerCase()
    .replace(/[^a-z0-9\s]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
  return cleaned ? cleaned.split(' ') : [];
}

function hashTokenVec(token, dim = 256) {
  const vec = new Float32Array(dim);
  let h = 2166136261 >>> 0;
  for (let i = 0; i < token.length; i++) {
    h ^= token.charCodeAt(i);
    h = Math.imul(h, 16777619) >>> 0;
  }
  for (let i = 0; i < dim; i++) {
    h ^= h << 13; h ^= h >>> 17; h ^= h << 5;
    vec[i] = ((h >>> 0) % 2000) / 1000 - 1; // [-1, 1]
  }
  return vec;
}

function meanEmbed(tokens, dim = 256) {
  const out = new Float32Array(dim);
  if (!tokens.length) return out;
  for (const t of tokens) {
    const v = hashTokenVec(t, dim);
    for (let i = 0; i < dim; i++) out[i] += v[i];
  }
  for (let i = 0; i < dim; i++) out[i] /= tokens.length;
  let norm = 0;
  for (let i = 0; i < dim; i++) norm += out[i] * out[i];
  norm = Math.sqrt(norm) || 1;
  for (let i = 0; i < dim; i++) out[i] /= norm;
  return out;
}

function cosineVec(a, b) {
  let s = 0;
  for (let i = 0; i < a.length; i++) s += a[i] * b[i];
  return s;
}

function localAttribution(text, maxTokens = 50) {
  let tokens = tokenizeClient(text);
  if (!tokens.length) return [];
  tokens = tokens.slice(0, maxTokens);
  const eOrig = meanEmbed(tokens);
  const rows = [];
  for (let i = 0; i < tokens.length; i++) {
    const masked = tokens.slice(0, i).concat(tokens.slice(i + 1));
    if (!masked.length) {
      rows.push({ position: i, token: tokens[i], attribution_score: 1.0 });
      continue;
    }
    const eMask = meanEmbed(masked);
    const score = 1 - cosineVec(eOrig, eMask);
    rows.push({ position: i, token: tokens[i], attribution_score: Number(score.toFixed(6)) });
  }
  rows.sort((x, y) => y.attribution_score - x.attribution_score);
  rows.forEach((r, idx) => r.rank = idx + 1);
  rows.sort((x, y) => x.position - y.position);
  return rows;
}

function Nav({ active, onNav, apiStatus }) {

          <span style={{ display:'inline-block', width:8, height:8, borderRadius:'50%', background:statusColor, boxShadow:`0 0 6px ${statusColor}` }} />

        </div>
      )}
    </nav>
  );
}

function StatCard({ value, label, color }) {

}

function Plot({ src, alt, caption }) {

}

}

        <p style={{ fontSize:18, color:'var(--text-muted)', marginTop:12 }}>Emerging Topic Detection & News Correlation using Neural Topic Modeling</p>
        <p style={{ fontSize:13, color:'var(--text-dim)', marginTop:6 }}>Mehak Jain (230079) · Anuj Kumar Singh (230073)</p>
      </div>
      <div style={{ display:'flex', gap:14, flexWrap:'wrap', marginBottom:32 }}>

        <StatCard value="15" label="Topics (BERT)" color="var(--cyan)" />
        <StatCard value="1036%" label="COVID Velocity" color="var(--red)" />
        <StatCard value="✅" label="Context Separated" color="var(--green)" />
      </div>

      <Section badge="THE PROBLEM" title="Real Events vs Internet Noise">
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:20 }}>
          <div style={{ padding:20, borderRadius:'var(--radius-sm)', background:'rgba(16,185,129,0.06)', border:'1px solid rgba(16,185,129,0.12)' }}>
            <div style={{ fontWeight:700, color:'var(--green)', marginBottom:10, fontSize:13 }}>✓ REAL EVENT</div>
            <ul style={{ color:'var(--text-muted)', fontSize:13, lineHeight:2, paddingLeft:18 }}>
              <li>Sustained multi-day media coverage</li><li>Accelerating article velocity</li><li>Multiple independent sources</li><li>Verifiable in GDELT database</li>

      <Section badge="PIPELINE" title="Two-Phase Architecture">
        <div style={{ display:'grid', gridTemplateColumns:'1fr 40px 1fr', alignItems:'center', gap:16 }}>
          <div style={{ padding:20, borderRadius:'var(--radius-sm)', background:'rgba(245,158,11,0.06)', border:'1px solid rgba(245,158,11,0.12)' }}>

            <div style={{ fontSize:12, color:'var(--text-muted)', lineHeight:1.8 }}>SBERT (384-dim) → UMAP (5-dim) → HDBSCAN<br/>→ c-TF-IDF topic representation<br/><span style={{ color:'var(--green)' }}>✅ Context-aware separation</span></div>

}

// ============ PHASE 1 PAGE ============

function Phase1Page() {
  return (
    <div className="fade-up">
      <div style={{ display:'flex', gap:14, flexWrap:'wrap', marginBottom:24 }}>
        <StatCard value="10" label="Topics" color="var(--orange)" />
        <StatCard value="0.61" label="LDA Confidence" color="var(--orange)" />
        <StatCard value="278%" label="Trump Growth" color="var(--orange)" />
        <StatCard value="3" label="Novel Features" color="var(--orange)" />
      </div>

      <Section badge="PROBLEM" title="What Problem Are We Solving?">
        <Narrative icon="🎯" title="The Challenge">
          <p>Every day, thousands of topics trend across the internet. Most are noise — viral memes, celebrity gossip, outrage cycles that die within hours. The core challenge is: <strong style={{ color:'var(--text)' }}>how do you algorithmically distinguish a genuine emerging news event from internet noise?</strong></p>
        </Narrative>
        <Narrative icon="🌍" title="Why This Matters">
          <p>Real-world events like elections, pandemics, and natural disasters create measurable statistical signatures in news coverage. Detecting these early has applications in <strong style={{ color:'var(--text)' }}>journalism, crisis response, financial markets, and public health surveillance</strong>. A system that can automatically separate signal from noise in real-time could provide hours or days of early warning compared to manual monitoring.</p>
        </Narrative>
      </Section>

      <Section badge="APPROACH" title="Phase 1: LDA Pipeline — Step by Step">
        <Narrative icon="📊" title="Step 1 — Data Loading & Balancing">
          <p>We load the HuffPost News Category Dataset (210K+ articles, 42 categories, 2012–2022) and create a <strong style={{ color:'var(--text)' }}>strictly balanced subset of 11,000 articles</strong> — exactly 1,000 per year. This prevents temporal volume bias (e.g., more articles during election years) from artificially weighting the model.</p>
        </Narrative>
        <Narrative icon="🧹" title="Step 2 — Text Cleaning & Baseline TF-IDF">
          <p>Articles are lowercased, punctuation removed, and stopwords filtered. We run TF-IDF (5,000 features) as a baseline — this identifies <strong style={{ color:'var(--text)' }}>"trump" as the #1 term</strong> across the entire 11-year corpus, confirming political dominance but revealing TF-IDF's inability to track <em>when</em> topics emerge.</p>
        </Narrative>
        <Narrative icon="🧠" title="Step 3 — LDA Topic Modeling">
          <p>Latent Dirichlet Allocation with 10 components is fitted on count vectors. LDA is a generative probabilistic model that assumes each document is a mixture of topics, and each topic is a distribution over words. It discovers hidden thematic structure purely through word co-occurrence — <strong style={{ color:'var(--text)' }}>completely unsupervised, zero labels</strong>.</p>
        </Narrative>
        <Narrative icon="⚙️" title="Step 4 — Novel Feature Engineering">
          <p>Three custom features address LDA's core limitation (no temporal awareness):</p>
          <ul style={{ paddingLeft:20, marginTop:8 }}>
            <li><strong style={{ color:'var(--text)' }}>Temporal Weight:</strong> <code style={{ background:'var(--bg)', padding:'2px 6px', borderRadius:4, fontSize:12 }}>w(d) = log(1+Δt) / max(log(1+Δt))</code> — recent articles get higher weight</li>
            <li><strong style={{ color:'var(--text)' }}>Category Velocity:</strong> Growth rate of article's category at publication time — articles during surges carry stronger signal</li>
            <li><strong style={{ color:'var(--text)' }}>Text Richness:</strong> <code style={{ background:'var(--bg)', padding:'2px 6px', borderRadius:4, fontSize:12 }}>R(d) = |unique| / (|total| + 1)</code> — measures semantic density</li>
          </ul>
        </Narrative>
      </Section>

      <Section badge="MODEL" title="Why LDA Over Alternatives?">
        <Narrative icon="🔬" title="Model Selection Rationale">
          <p><strong style={{ color:'var(--text)' }}>LDA (Blei et al., 2003)</strong> was chosen as the Phase 1 baseline because it is the most widely-used unsupervised topic model in NLP. Unlike clustering methods (K-Means), LDA captures <strong style={{ color:'var(--text)' }}>mixed-membership</strong> — a single article can belong to multiple topics simultaneously. Unlike NMF, LDA has a proper probabilistic foundation with Dirichlet priors.</p>
          <p style={{ marginTop:8 }}>Configuration: 10 topics, batch learning, 20 iterations, CountVectorizer with 5,000 features. We deliberately chose LDA to establish a strong traditional ML baseline before introducing deep learning in Phase 2.</p>
        </Narrative>
      </Section>

      <Section badge="DATA" title="Dataset & Preprocessing">
        <Narrative icon="📁" title="Source & Collection">
          <p><strong style={{ color:'var(--text)' }}>HuffPost News Category Dataset</strong> (Misra, 2022) from Kaggle. 210,000+ articles, 42 news categories, spanning 2012–2022. Each article contains a headline, short description, category label, and publication date.</p>
          <p style={{ marginTop:8 }}>We sample 1,000 articles per year (stratified) to create an 11,000-article balanced corpus. Cleaning: lowercase, remove punctuation, strip whitespace. No lemmatization (preserves compound terms like "health care").</p>
        </Narrative>
      </Section>

      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:20, marginBottom:24 }}>
        <Plot src="model_plots/baseline_tfidf.png" alt="TF-IDF" caption="Baseline: Top 20 words by TF-IDF score" />
        <Plot src="model_plots/feature_engineering.png" alt="Features" caption="3 novel features addressing LDA's static assumption" />
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:20, marginBottom:24 }}>
        <Plot src="model_plots/lda_topics.png" alt="Topics" caption="LDA discovered 10 topics — completely unsupervised" />
        <Plot src="model_plots/lda_topic_evolution.png" alt="Evolution" caption="Topic prevalence over 2012–2022" />
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:20, marginBottom:24 }}>
        <Plot src="model_plots/confidence_comparison.png" alt="Confidence" caption="Standard vs Temporally-Weighted LDA" />
        <Plot src="model_plots/semantic_velocity.png" alt="Velocity" caption="Peak semantic velocity per topic" />
      </div>

      <Section badge="RESULTS" title="What Improved?">
        <Narrative icon="📈" title="Key Metrics & Plain-English Meaning">
          <p><strong style={{ color:'var(--green)' }}>LDA confidence: 0.6103</strong> — On average, the model is 61% sure about which topic each article belongs to. This is solid for a 10-topic unsupervised model on noisy news text.</p>
          <p style={{ marginTop:8 }}><strong style={{ color:'var(--green)' }}>Trump topic: 278% growth (2013→2016)</strong> — The topic containing "trump/president/donald" grew nearly 3x during the campaign period, proving the model can detect real-world events through statistical velocity signatures.</p>
          <p style={{ marginTop:8 }}><strong style={{ color:'var(--green)' }}>COVID topic: automatically discovered</strong> — Without any labels, LDA found a cluster with "covid/court/coronavirus/state" — demonstrating unsupervised event detection. However, this same result also reveals the model's critical weakness (see Failure below).</p>
        </Narrative>
      </Section>

      <Section badge="FAILURE ANALYSIS" title="What Didn't Work?" borderColor="rgba(239,68,68,0.3)">
        <Narrative icon="❌" title="The COVID/Court Conflation Problem">
          <p>LDA's bag-of-words model <strong style={{ color:'var(--red)' }}>conflates 2014 ACA legal news with 2020 COVID pandemic news</strong> into the same topic. The COVID topic statistically peaks in <strong style={{ color:'var(--red)' }}>2014</strong> — five years before the pandemic existed.</p>
          <p style={{ marginTop:8 }}><strong style={{ color:'var(--text)' }}>Root cause:</strong> In 2014, the Affordable Care Act was being challenged in federal courts. Top words: "state, health, court, people." In 2020, COVID articles used the exact same vocabulary. LDA only sees word frequencies, not meaning — identical vocabulary → cosine similarity ~1.0 → same topic.</p>
          <p style={{ marginTop:8 }}><strong style={{ color:'var(--text)' }}>What we'd do differently:</strong> This failure directly motivates Phase 2. We need sentence-level embeddings (SBERT) that encode full semantic context, not just word counts. "Court ruling on health policy" and "coronavirus spreading" should produce very different embeddings.</p>
        </Narrative>
      </Section>
    </div>
  );
}

// ============ PHASE 2 PAGE ============

function Phase2Page() {
  return (
    <div className="fade-up">
      <div style={{ display:'flex', gap:14, flexWrap:'wrap', marginBottom:24 }}>
        <StatCard value="15" label="Topics" color="var(--blue)" />
        <StatCard value="384" label="Embedding Dim" color="var(--cyan)" />
        <StatCard value="1036%" label="COVID Velocity" color="var(--red)" />
        <StatCard value="✅" label="Context Separated" color="var(--green)" />
      </div>

      <Section badge="PROBLEM" title="What Problem Does Phase 2 Solve?">
        <Narrative icon="🎯" title="The Limitation of Bag-of-Words">
          <p>Phase 1 proved that LDA can discover topics — but it <strong style={{ color:'var(--red)' }}>cannot distinguish context</strong>. When two different real-world events share vocabulary (ACA legal battles vs COVID pandemic), LDA merges them into one topic. This is a fundamental limitation of any bag-of-words approach: it treats words as independent signals and ignores sentence-level meaning.</p>
        </Narrative>
        <Narrative icon="🌍" title="Why Context Matters">
          <p>In real-world trend detection, context is everything. A spike in the word "health" means completely different things in 2014 (legal battles) vs 2020 (pandemic). False conflation would cause a trend detection system to <strong style={{ color:'var(--text)' }}>generate false alarms or miss critical events</strong>. Phase 2 solves this by encoding full sentence semantics.</p>
        </Narrative>
      </Section>

      <Section badge="APPROACH" title="Phase 2: BERTopic Pipeline — Step by Step">
        <Narrative icon="1️⃣" title="Step 1 — SBERT Sentence Embeddings (Reimers & Gurevych, 2019)">
          <p>Standard BERT requires both sentences fed simultaneously — finding the most similar pair in <strong style={{ color:'var(--text)' }}>10,000 sentences takes ~65 hours</strong> on a V100 GPU (50 million inference computations). Sentence-BERT's Siamese network pre-computes fixed-size embeddings via mean pooling, reducing this to <strong style={{ color:'var(--text)' }}>5 seconds</strong> while maintaining accuracy on semantic textual similarity benchmarks.</p>
          <p style={{ marginTop:8 }}>We use <code style={{ background:'var(--bg)', padding:'2px 6px', borderRadius:4, fontSize:12 }}>all-MiniLM-L6-v2</code> (22M params, 384-dim) — distilled from all-mpnet-base-v2 (110M params) via knowledge distillation, achieving 96.4% of full model performance at 5× faster inference. Justified for 11K short headlines on CPU. <strong style={{ color:'var(--text)' }}>Why cosine metric in UMAP:</strong> SBERT optimizes cosine similarity during Siamese training — using Euclidean distance in UMAP would misalign with the geometric space the embeddings were designed for.</p>
        </Narrative>
        <Narrative icon="2️⃣" title="Step 2 — UMAP Dimensionality Reduction (McInnes et al., 2018)">
          <p>384 dimensions is too high for clustering. <strong style={{ color:'var(--text)' }}>UMAP</strong> reduces this to 5 dimensions while preserving the topological structure of the data. It constructs a weighted k-neighbor graph in high-dimensional space and optimizes a low-dimensional layout via cross-entropy minimization.</p>
          <p style={{ marginTop:8 }}>Parameters: <code style={{ background:'var(--bg)', padding:'2px 6px', borderRadius:4, fontSize:12 }}>n_neighbors=15, n_components=5, min_dist=0.0, metric='cosine'</code> — cosine metric aligns with SBERT's training objective.</p>
        </Narrative>
        <Narrative icon="3️⃣" title="Step 3 — HDBSCAN Clustering (Campello et al., 2013)">
          <p><strong style={{ color:'var(--text)' }}>HDBSCAN</strong> is a density-based clustering algorithm that automatically discovers the number of clusters — unlike LDA's fixed topic count. It builds a hierarchy of density levels and extracts the most stable clusters via persistence.</p>
          <p style={{ marginTop:8 }}>Parameters: <code style={{ background:'var(--bg)', padding:'2px 6px', borderRadius:4, fontSize:12 }}>min_cluster_size=50, min_samples=10</code> — documents that don't fit any cluster become outliers (43.2% in our corpus).</p>
        </Narrative>
        <Narrative icon="4️⃣" title="Step 4 — c-TF-IDF Topic Representation (Grootendorst, 2022)">
          <p><strong style={{ color:'var(--text)' }}>Class-based TF-IDF</strong> treats each cluster as a single document, concatenates all texts, and applies a modified TF-IDF formula. Unlike standard TF-IDF, the IDF component is computed across classes (clusters), not documents. This produces interpretable topic labels from cluster embeddings.</p>
          <p style={{ marginTop:8 }}>Formula: <code style={{ background:'var(--bg)', padding:'2px 6px', borderRadius:4, fontSize:12 }}>c-TF-IDF(t,c) = (tf_tc / A_c) × log(1 + A / tf_t)</code></p>
          <p style={{ marginTop:8 }}>Unlike Top2Vec's centroid-based word selection, c-TF-IDF asks: <em>what words appear frequently in this cluster but rarely in others?</em> A cluster need not be spherical — c-TF-IDF captures discriminative vocabulary regardless of cluster geometry.</p>
        </Narrative>
      </Section>

      <Section badge="ARCHITECTURE" title="BERTopic Pipeline Visualization">

          <ul style={{ paddingLeft:20, marginTop:8 }}>
            <li><strong style={{ color:'var(--text)' }}>vs LDA:</strong> Uses contextual embeddings instead of bag-of-words → solves the conflation problem</li>
            <li><strong style={{ color:'var(--text)' }}>vs Top2Vec:</strong> BERTopic's c-TF-IDF produces more interpretable topic labels</li>
            <li><strong style={{ color:'var(--text)' }}>vs CTM (Combined Topic Model):</strong> BERTopic is modular — each stage can be swapped independently</li>
          </ul>
          <p style={{ marginTop:8 }}><strong style={{ color:'var(--text)' }}>Why all-MiniLM-L6-v2?</strong> 22M parameters, 384-dim output. Chosen over all-mpnet-base-v2 (110M params, 768-dim) because our corpus of 11K short headlines doesn't require full model capacity. MiniLM achieves 96.4% of mpnet's performance at 5× faster inference — a justified speed/accuracy trade-off.</p>

          <p style={{ marginTop:8 }}><strong style={{ color:'var(--text)' }}>Outlier handling as implicit regularization:</strong> HDBSCAN assigns 43.2% of documents as outliers (topic = -1). This is deliberate — our articles average ~20 words. Very short texts produce noisier SBERT embeddings; HDBSCAN correctly identifies these as ambiguous rather than forcing incorrect assignments. <strong style={{ color:'var(--text)' }}>LDA's 0% outlier rate is not a strength</strong> — it generates noisy topic assignments for documents that genuinely belong to no coherent cluster. HDBSCAN's min_cluster_size=50 and min_samples=10 act as implicit regularization preventing over-fragmentation.</p>
          <p style={{ marginTop:8 }}><strong style={{ color:'var(--text)' }}>Regularization:</strong> UMAP's <code style={{ background:'var(--bg)', padding:'2px 6px', borderRadius:4, fontSize:12 }}>min_dist=0.0</code> and HDBSCAN's <code style={{ background:'var(--bg)', padding:'2px 6px', borderRadius:4, fontSize:12 }}>min_cluster_size=50</code> act as implicit regularization — preventing overly fragmented topics while allowing meaningful separation.</p>

// ============ PREDICT PAGE ============

function PredictPage({ onPredicted }) {
  const [text, setText] = useState('');
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  const examples = [
    "Trump announces new trade tariffs against China amid growing tensions",
    "COVID-19 vaccine rollout begins as hospitals prepare for mass distribution",
    "Supreme Court hears landmark case on affordable healthcare mandates",
    "Climate change activists demand immediate action at UN summit",
    "New study reveals breakthrough in artificial intelligence language models"
  ];

  const predict = async (inputText) => {
    const t = inputText || text;
    if (!t.trim()) return;
    setLoading(true); setError(null); setResult(null);
    try {
      const res = await fetch(`${API}/predict`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({text:t}) });
      if (!res.ok) throw new Error('API error');
      const payload = await res.json();
      setResult(payload);
      if (onPredicted) onPredicted(payload);
    } catch(e) { setError('Could not connect to API. Run: python3 api_server.py'); }
    setLoading(false);
  };

  return (
    <div className="fade-up">
      <Section badge="INTERACTIVE" title="Live Topic Prediction" subtitle="Enter any news headline or article — BERTopic classifies it in real-time using SBERT embeddings">
        <textarea value={text} onChange={e=>setText(e.target.value)} placeholder="Paste a news article headline or text here..."
          style={{ width:'100%', minHeight:90, padding:14, borderRadius:'var(--radius-sm)', background:'var(--bg-input)', border:'1px solid var(--border)', color:'var(--text)', fontFamily:'Inter', fontSize:14, resize:'vertical', outline:'none' }}
          onFocus={e=>e.target.style.borderColor='var(--blue)'} onBlur={e=>e.target.style.borderColor='var(--border)'} />
        <div style={{ display:'flex', gap:12, marginTop:14, alignItems:'center' }}>
          <button onClick={()=>predict()} disabled={loading||!text.trim()}
            style={{ padding:'10px 28px', borderRadius:'var(--radius-sm)', border:'none', background:loading?'var(--text-dim)':'var(--blue)', color:'#fff', fontFamily:'Inter', fontSize:13, fontWeight:600, cursor:loading?'wait':'pointer' }}>
            {loading ? '⏳ Analyzing...' : '🔍 Predict Topic'}
          </button>
          <span style={{ fontSize:12, color:'var(--text-dim)' }}>or try an example ↓</span>
        </div>
      </Section>

      <div style={{ display:'flex', gap:8, flexWrap:'wrap', marginBottom:24 }}>
        {examples.map((ex,i)=>(
          <button key={i} onClick={()=>{setText(ex);predict(ex)}}
            style={{ padding:'8px 14px', borderRadius:20, border:'1px solid var(--border)', background:'var(--bg-card)', color:'var(--text-muted)', fontFamily:'Inter', fontSize:11, cursor:'pointer', maxWidth:320, textAlign:'left', lineHeight:1.4, transition:'all 0.2s' }}
            onMouseEnter={e=>{e.target.style.borderColor='var(--blue)';e.target.style.color='var(--text)'}} onMouseLeave={e=>{e.target.style.borderColor='var(--border)';e.target.style.color='var(--text-muted)'}}
          >{ex}</button>
        ))}
      </div>

      {error && <Section borderColor="rgba(239,68,68,0.3)"><p style={{ color:'var(--red)', fontSize:13 }}>⚠ {error}</p></Section>}

      {result && (
        <div className="fade-up">
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:20, marginBottom:20 }}>
            <Section borderColor="rgba(59,130,246,0.3)">
              <div style={{ fontSize:11, color:'var(--blue)', fontWeight:600, textTransform:'uppercase', marginBottom:6 }}>Predicted Topic</div>
              <div style={{ fontSize:26, fontWeight:800 }}>{result.topic.name}</div>
              <div style={{ fontSize:12, color:'var(--text-dim)' }}>Topic ID: {result.topic.id} · Confidence: {(result.confidence*100).toFixed(1)}%</div>
            </Section>
            <Section>
              <div style={{ fontSize:11, color:'var(--cyan)', fontWeight:600, textTransform:'uppercase', marginBottom:6 }}>Top Topic Words (c-TF-IDF)</div>
              <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
                {(result.topic.words||[]).map((w,i)=>(
                  <span key={i} style={{ padding:'3px 10px', borderRadius:10, fontSize:12, background:`rgba(6,182,212,${0.15-i*0.01})`, color:i<3?'var(--cyan)':'var(--text-dim)', fontWeight:i<3?600:400 }}>{w.word}</span>
                ))}
              </div>
            </Section>
          </div>
          <Section>
            <div style={{ fontSize:11, color:'var(--green)', fontWeight:600, textTransform:'uppercase', marginBottom:14 }}>Most Similar Articles in Corpus</div>
            {result.similar_articles.map((art,i)=>(
              <div key={i} style={{ padding:'10px 14px', borderRadius:'var(--radius-sm)', background:i%2===0?'var(--bg)':'transparent', display:'grid', gridTemplateColumns:'1fr 110px 80px 50px', gap:10, alignItems:'center', marginBottom:3 }}>
                <div style={{ fontSize:13 }}>{art.headline}</div>
                <div style={{ fontSize:11, color:'var(--text-dim)' }}>{art.category}</div>
                <div style={{ fontSize:11, color:'var(--text-dim)' }}>{art.date}</div>
                <div style={{ fontSize:12, fontWeight:600, color:art.sbert_similarity>0.7?'var(--green)':'var(--text-muted)' }}>{(art.sbert_similarity*100).toFixed(0)}%</div>
              </div>
            ))}
          </Section>
        </div>
      )}
    </div>
  );
}

function ComparePage() {
  return (
    <div className="fade-up">
      <Section badge="HEAD-TO-HEAD" title="Phase 1 (LDA) vs Phase 2 (BERTopic)">
        <Plot src="bert_plots/lda_vs_bertopic.png" alt="Comparison" caption="Feature-by-feature comparison" />
      </Section>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:20, marginBottom:24 }}>
        <Section borderColor="rgba(245,158,11,0.3)">
          <div style={{ fontWeight:700, color:'var(--orange)', fontSize:13, marginBottom:14 }}>Phase 1: LDA</div>
          <table style={{ width:'100%', fontSize:12, color:'var(--text-muted)' }}><tbody>
            {[['Method','Bag-of-Words + Dirichlet'],['Topics','10 (fixed)'],['Embedding','Count Vectors'],['Temporal','Manual weight hack'],['Context','❌ Conflated ACA + COVID'],['COVID peak','2014 (wrong!)']].map(([k,v])=>(
              <tr key={k}><td style={{ padding:'5px 0', fontWeight:600, color:'var(--text-dim)' }}>{k}</td><td style={{ padding:'5px 0' }}>{v}</td></tr>
            ))}
          </tbody></table>
        </Section>
        <Section borderColor="rgba(59,130,246,0.3)">
          <div style={{ fontWeight:700, color:'var(--blue)', fontSize:13, marginBottom:14 }}>Phase 2: BERTopic</div>
          <table style={{ width:'100%', fontSize:12, color:'var(--text-muted)' }}><tbody>
            {[['Method','SBERT + UMAP + HDBSCAN'],['Topics','15 (auto-discovered)'],['Embedding','384-dim SBERT'],['Temporal','Native topics_over_time'],['Context','✅ ACA ≠ COVID'],['COVID peak','2020 (correct!)']].map(([k,v])=>(
              <tr key={k}><td style={{ padding:'5px 0', fontWeight:600, color:'var(--text-dim)' }}>{k}</td><td style={{ padding:'5px 0' }}>{v}</td></tr>
            ))}
          </tbody></table>
        </Section>
      </div>
      <Section badge="KEY INSIGHT" title="Why BERTopic Wins" borderColor="rgba(139,92,246,0.3)">
        <p style={{ color:'var(--text-muted)', fontSize:14, lineHeight:1.8 }}>
          SBERT's Siamese BERT architecture (Reimers & Gurevych, 2019) produces <strong style={{ color:'var(--purple)' }}>semantically meaningful sentence embeddings</strong> where cosine similarity correlates with human judgment. Combined with UMAP's topological preservation and HDBSCAN's density-based clustering, BERTopic (Grootendorst, 2022) achieves context-aware topic modeling that LDA's bag-of-words approach fundamentally cannot.
        </p>
        <div style={{ marginTop:14, padding:14, borderRadius:'var(--radius-sm)', background:'var(--bg)', display:'grid', gridTemplateColumns:'1fr 1fr', gap:20 }}>
          <div>
            <div style={{ fontSize:12, color:'var(--text-dim)', marginBottom:4 }}>SBERT: "court rules on health mandate" vs "covid spreading"</div>
            <div style={{ fontSize:22, fontWeight:800, color:'var(--green)' }}>0.27 <span style={{ fontSize:11, fontWeight:400, color:'var(--text-dim)' }}>cosine (separated)</span></div>
          </div>
          <div>
            <div style={{ fontSize:12, color:'var(--text-dim)', marginBottom:4 }}>LDA BoW: same two sentences</div>
            <div style={{ fontSize:22, fontWeight:800, color:'var(--red)' }}>~0.80 <span style={{ fontSize:11, fontWeight:400, color:'var(--text-dim)' }}>cosine (conflated)</span></div>
          </div>
        </div>
      </Section>
    </div>
  );
}

// ============ INTERPRETABILITY PAGE ============

function InterpretabilityPage({ latestPrediction }) {
  const [heatmap, setHeatmap] = useState(null);
  const [rowsByTopic, setRowsByTopic] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [liveText, setLiveText] = useState('');
  const [liveRows, setLiveRows] = useState([]);
  const [liveTop, setLiveTop] = useState([]);
  const [liveLoading, setLiveLoading] = useState(false);
  const [liveError, setLiveError] = useState(null);
  const [liveUpdatedAt, setLiveUpdatedAt] = useState(null);
  const [liveMode, setLiveMode] = useState('backend');
  const [apiBase, setApiBase] = useState(() => {
    const saved = window.localStorage.getItem('aml_api_base');
    return saved || API;
  });
  const onGithubPages = window.location.hostname.includes('github.io');

  useEffect(() => {
    let mounted = true;
    const load = async () => {
      setLoading(true);
      setError(null);
      try {
        const plotRes = await fetch(`${apiBase}/plots/token_attribution.png`);
        if (!plotRes.ok) throw new Error('Could not load attribution heatmap');
        const plotJson = await plotRes.json();

        const topicsRes = await fetch(`${apiBase}/topics`);
        if (!topicsRes.ok) throw new Error('Could not load topic list');
        const topicsJson = await topicsRes.json();
        const topTopics = (topicsJson.topics || []).slice(0, 3).map(t => t.id);

        const attrResponses = await Promise.all(
          topTopics.map(tid => fetch(`${apiBase}/attribution/${tid}`))
        );
        const attrJson = await Promise.all(
          attrResponses.map(async r => (r.ok ? r.json() : { rows: [], top_tokens: [], topic_id: -1 }))
        );

        if (mounted) {
          setHeatmap(`data:image/png;base64,${plotJson.image}`);
          setRowsByTopic(attrJson);
        }
      } catch (e) {
        if (mounted) setError('Could not load interpretability artifacts. Run: python3 bert_model.py and python3 api_server.py');
      } finally {
        if (mounted) setLoading(false);
      }
    };
    load();
    return () => { mounted = false; };
  }, [apiBase]);

  const runLiveAttribution = async (inputText) => {
    const t = (inputText || liveText || '').trim();
    if (!t) {
      setLiveError('Enter text (or run a prediction first) to generate a dynamic attribution plot.');
      setLiveRows([]);
      setLiveTop([]);
      return;
    }
    setLiveLoading(true);
    setLiveError(null);
    try {
      const isLocalApi = /localhost|127\.0\.0\.1/.test(apiBase);
      if (onGithubPages && isLocalApi) {
        const rows = localAttribution(t);
        const top = [...rows].sort((a, b) => b.attribution_score - a.attribution_score).slice(0, 5);
        setLiveRows(rows);
        setLiveTop(top.map(r => ({ token: r.token, attribution_score: r.attribution_score, rank: r.rank })));
        setLiveMode('local');
        setLiveUpdatedAt(new Date().toLocaleTimeString());
        setLiveError('Using browser fallback attribution (approximate), because GitHub Pages cannot call localhost backend.');
        return;
      }
      const res = await fetch(`${apiBase}/attribution_live`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: t })
      });
      if (!res.ok) throw new Error(`Live attribution API error (${res.status})`);
      const payload = await res.json();
      setLiveRows(payload.rows || []);
      setLiveTop(payload.top_tokens || []);
      setLiveMode('backend');
      setLiveUpdatedAt(new Date().toLocaleTimeString());
    } catch (e) {
      const rows = localAttribution(t);
      const top = [...rows].sort((a, b) => b.attribution_score - a.attribution_score).slice(0, 5);
      setLiveRows(rows);
      setLiveTop(top.map(r => ({ token: r.token, attribution_score: r.attribution_score, rank: r.rank })));
      setLiveMode('local');
      setLiveUpdatedAt(new Date().toLocaleTimeString());
      setLiveError(`Backend unavailable (${e.message || 'request failed'}). Showing browser fallback attribution (approximate).`);
    } finally {
      setLiveLoading(false);
    }
  };

  useEffect(() => {
    if (latestPrediction && latestPrediction.input_text) {
      setLiveText(latestPrediction.input_text);
      runLiveAttribution(latestPrediction.input_text);
    }
  }, [latestPrediction]);

  useEffect(() => {
    const t = (liveText || '').trim();
    if (t.length < 8) return;
    const timer = setTimeout(() => {
      runLiveAttribution(t);
    }, 700);
    return () => clearTimeout(timer);
  }, [liveText, apiBase]);

  const maxScore = liveRows.length ? Math.max(...liveRows.map(r => Number(r.attribution_score) || 0), 1e-6) : 1;
  const sortedLive = [...liveRows].sort((a, b) => (Number(b.attribution_score) || 0) - (Number(a.attribution_score) || 0));

  return (
    <div className="fade-up">
      <Section badge="DYNAMIC" title="Live Input Attribution"
        subtitle="This plot updates for your current input text. It auto-refreshes while typing and can also be recomputed manually.">
        {onGithubPages && (
          <div style={{ marginBottom:10, padding:10, borderRadius:8, background:'rgba(245,158,11,0.12)', border:'1px solid rgba(245,158,11,0.25)', fontSize:12, color:'#fde68a' }}>
            You are on GitHub Pages (static hosting). Dynamic attribution requires a running backend API. If API URL is localhost, this will not work for remote viewers.
          </div>
        )}
        <div style={{ display:'grid', gridTemplateColumns:'1fr 160px', gap:8, marginBottom:10 }}>
          <input value={apiBase} onChange={e=>setApiBase(e.target.value)}
            placeholder="API base URL"
            style={{ width:'100%', height:36, padding:'0 10px', borderRadius:8, background:'var(--bg-input)', border:'1px solid var(--border)', color:'var(--text)', fontFamily:'Inter', fontSize:12, outline:'none' }} />
          <button onClick={() => window.localStorage.setItem('aml_api_base', apiBase.trim())}
            style={{ border:'none', borderRadius:8, background:'rgba(6,182,212,0.2)', color:'var(--cyan)', fontFamily:'Inter', fontSize:12, fontWeight:600, cursor:'pointer' }}>
            Save API URL
          </button>
        </div>
        <textarea value={liveText} onChange={e=>setLiveText(e.target.value)}
          placeholder="Paste text here (or use a prediction from Live Predict tab)..."
          style={{ width:'100%', minHeight:90, padding:14, borderRadius:'var(--radius-sm)', background:'var(--bg-input)', border:'1px solid var(--border)', color:'var(--text)', fontFamily:'Inter', fontSize:14, resize:'vertical', outline:'none' }} />
        <div style={{ marginTop:12, marginBottom:14 }}>
          <button onClick={()=>runLiveAttribution()} disabled={liveLoading || !liveText.trim()}
            style={{ padding:'10px 18px', borderRadius:'var(--radius-sm)', border:'none', background:liveLoading?'var(--text-dim)':'var(--blue)', color:'#fff', fontFamily:'Inter', fontSize:13, fontWeight:600, cursor:liveLoading?'wait':'pointer' }}>
            {liveLoading ? 'Computing...' : 'Recompute Attribution'}
          </button>
          {liveUpdatedAt && (
            <span style={{ marginLeft:10, fontSize:11, color:'var(--text-dim)' }}>Last updated: {liveUpdatedAt}</span>
          )}
          <span style={{ marginLeft:10, fontSize:11, color: liveMode === 'backend' ? 'var(--green)' : 'var(--orange)' }}>
            Mode: {liveMode === 'backend' ? 'Backend (SBERT)' : 'Browser Fallback'}
          </span>
        </div>
        {liveError && <p style={{ fontSize:13, color:'var(--red)', marginBottom:10 }}>{liveError}</p>}
        {liveRows.length > 0 && (
          <div style={{ border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', padding:12, background:'var(--bg)' }}>
            <div style={{ fontSize:12, color:'var(--text-dim)', marginBottom:8 }}>Positional heat strip (left-to-right token order)</div>
            <div style={{ display:'grid', gridTemplateColumns:`repeat(${Math.min(liveRows.length, 20)}, minmax(32px, 1fr))`, gap:6, overflowX:'auto', paddingBottom:4 }}>
              {liveRows.slice(0, 20).map((row, idx) => {
                const score = Number(row.attribution_score) || 0;
                const alpha = Math.min(1, Math.max(0.15, score / (maxScore || 1)));
                return (
                  <div key={`${row.token}-${idx}`} title={`${row.token}: ${score.toFixed(4)}`}
                    style={{ height:76, borderRadius:6, background:`rgba(16,185,129,${alpha})`, border:'1px solid rgba(16,185,129,0.2)', display:'flex', alignItems:'center', justifyContent:'center', padding:'4px 2px' }}>
                    <span style={{ fontSize:10, color:'#d1fae5', textAlign:'center', lineHeight:1.2 }}>{row.token}</span>
                  </div>
                );
              })}
            </div>
            <div style={{ marginTop:12 }}>
              <div style={{ fontSize:12, color:'var(--text-dim)', marginBottom:6 }}>Top token contribution bars</div>
              {sortedLive.slice(0, 10).map((row, i) => {
                const score = Number(row.attribution_score) || 0;
                const widthPct = Math.max(4, (score / (maxScore || 1)) * 100);
                return (
                  <div key={`${row.token}-bar-${i}`} style={{ display:'grid', gridTemplateColumns:'140px 1fr 80px', gap:8, alignItems:'center', marginBottom:6 }}>
                    <div style={{ fontSize:12, color:'var(--text)' }}>{row.token}</div>
                    <div style={{ height:10, borderRadius:999, background:'rgba(255,255,255,0.08)', overflow:'hidden' }}>
                      <div style={{ width:`${widthPct}%`, height:'100%', background:'linear-gradient(90deg,#06b6d4,#10b981)' }} />
                    </div>
                    <div style={{ fontSize:12, color:'var(--cyan)', textAlign:'right', fontWeight:600 }}>{score.toFixed(4)}</div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
        {liveTop.length > 0 && (
          <div style={{ marginTop:14 }}>
            <div style={{ fontSize:12, color:'var(--cyan)', marginBottom:6, fontWeight:600 }}>Top attributed tokens (current input)</div>
            <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
              {liveTop.map((tk, i) => (
                <span key={`${tk.token}-${i}`} style={{ padding:'5px 10px', borderRadius:999, background:'rgba(6,182,212,0.15)', color:'var(--cyan)', fontSize:12 }}>
                  {tk.token} ({Number(tk.attribution_score).toFixed(4)})
                </span>
              ))}
            </div>
          </div>
        )}
      </Section>

      <Section badge="STEP 13 (STATIC)" title="Embedding Interpretability — Token Attribution (Corpus Baseline)"
        subtitle="Precomputed corpus-level artifact from bert_model.py. Use the Dynamic section above for input-specific attribution changes.">
        <div style={{ padding:14, borderRadius:'var(--radius-sm)', background:'var(--bg)', marginBottom:18, fontSize:13, color:'var(--text-muted)', lineHeight:1.8 }}>
          Token attribution measures how much removing each word changes the SBERT embedding. High scores confirm the model attends to topically relevant terms.
        </div>
        {loading && <p style={{ fontSize:13, color:'var(--text-dim)' }}>Loading interpretability outputs...</p>}
        {error && <p style={{ fontSize:13, color:'var(--red)' }}>{error}</p>}
        {!loading && !error && heatmap && (
          <div style={{ marginBottom:20 }}>
            <img src={heatmap} alt="Token attribution heatmap"
              style={{ width:'100%', borderRadius:'var(--radius)', border:'1px solid var(--border)', boxShadow:'var(--shadow)' }} />
            <p style={{ fontSize:12, color:'var(--text-dim)', marginTop:8 }}>
              Token attribution heatmap (3 topics × 5 representative documents).
            </p>
          </div>
        )}
      </Section>

      <Section badge="TOP TOKENS" title="Top-5 Attributed Tokens Per Topic">
        <div style={{ overflowX:'auto' }}>
          <table style={{ width:'100%', borderCollapse:'collapse', fontSize:12 }}>
            <thead>
              <tr>
                {['Topic ID', 'Token', 'Mean Attribution Score'].map(h => (
                  <th key={h} style={{ textAlign:'left', padding:'8px 10px', borderBottom:'1px solid var(--border)', color:'var(--text-dim)', fontWeight:600 }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {rowsByTopic.length === 0 && (
                <tr><td colSpan="3" style={{ padding:'10px', color:'var(--text-dim)' }}>No attribution rows found.</td></tr>
              )}
              {rowsByTopic.map((topicObj, idx) => (
                (topicObj.top_tokens || []).map((tk, jdx) => (
                  <tr key={`${idx}-${jdx}`} style={{ background: (jdx % 2 === 0) ? 'rgba(255,255,255,0.02)' : 'transparent' }}>
                    <td style={{ padding:'8px 10px', color:'var(--text-muted)' }}>{topicObj.topic_id}</td>
                    <td style={{ padding:'8px 10px', color:'var(--text)' }}>{tk.token}</td>
                    <td style={{ padding:'8px 10px', color:'var(--cyan)', fontWeight:600 }}>{Number(tk.mean_attribution).toFixed(4)}</td>
                  </tr>
                ))
              ))}
            </tbody>
          </table>
        </div>
      </Section>
    </div>
  );
}

// ============ APP ============

function App() {
  const [page, setPage] = useState('overview');
  const [latestPrediction, setLatestPrediction] = useState(null);
  const apiStatus = useApiStatus();
  return (
    <div>
      <Nav active={page} onNav={setPage} apiStatus={apiStatus} />
      <main style={{ maxWidth:1280, margin:'0 auto', padding:'28px 28px 60px' }}>
        {page==='overview' && <OverviewPage />}
        {page==='phase1' && <Phase1Page />}
        {page==='phase2' && <Phase2Page />}
        {page==='predict' && <PredictPage onPredicted={setLatestPrediction} />}
        {page==='compare' && <ComparePage />}
        {page==='interpretability' && <InterpretabilityPage latestPrediction={latestPrediction} />}
      </main>
      <footer style={{ borderTop:'1px solid var(--border)', padding:'20px 28px', textAlign:'center' }}>
        <p style={{ fontSize:12, color:'var(--text-dim)' }}>Dynamic Trend & Event Detector · Mehak Jain & Anuj Kumar Singh · AML & DL 2025</p>
        <p style={{ fontSize:10, color:'var(--text-dim)', marginTop:4 }}>Grootendorst (2022) arXiv:2203.05794 · Reimers & Gurevych (2019) arXiv:1908.10084 · Blei et al. (2003) JMLR</p>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
